name: Update Game Pass catalog
on:
  schedule:
    - cron: '0 6 * * *'
  push:
    paths:
      - '.github/workflows/update-gamepass.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Game Pass catalog
        run: |
          node << 'EOF'
          const https = require('https');
          const fs   = require('fs');

          function get(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'GameShelf-bot/1.0' } }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch(e) { reject(e); } });
              }).on('error', reject);
            });
          }

          async function main() {
            // Load existing game IDs to detect new additions by diff
            let existingIds = new Set();
            let existingNewGames = [];
            try {
              const prev = JSON.parse(fs.readFileSync('gamepass.json', 'utf8'));
              existingIds = new Set((prev.games || []).map(g => g.id));
              existingNewGames = prev.newGames || [];
            } catch(e) {}

            const [s1, s2] = await Promise.all([
              get('https://catalog.gamepass.com/sigls/v2?id=fdd9e2a7-0fee-49f6-ad69-4354098401ff&language=en-US&market=US'),
              get('https://catalog.gamepass.com/sigls/v2?id=b8900d09-a491-44cc-916e-32b5acae621b&language=en-US&market=US'),
            ]);

            const seen = new Set(); const ids = [];
            for (const item of [...s1.slice(1), ...s2.slice(1)])
              if (item.id && !seen.has(item.id)) { seen.add(item.id); ids.push(item.id); }
            console.log('IDs found:', ids.length);

            const byId = {};
            for (let i = 0; i < ids.length; i += 20) {
              const batch = ids.slice(i, i + 20).join(',');
              const data  = await get(
                `https://displaycatalog.mp.microsoft.com/v7.0/products?bigIds=${batch}&market=US&languages=en-US`
              );
              for (const prod of data.Products || []) {
                const loc = prod.LocalizedProperties?.[0];
                if (!loc?.ProductTitle) continue;
                const imgObj = loc.Images?.find(i => ['BoxArt','Poster'].includes(i.ImagePurpose));
                const img = imgObj?.Uri
                  ? (imgObj.Uri.startsWith('//') ? 'https:' + imgObj.Uri : imgObj.Uri)
                  : null;
                byId[prod.ProductId] = {
                  title: loc.ProductTitle,
                  img,
                  id: prod.ProductId,
                  releaseDate: prod.MarketProperties?.[0]?.OriginalReleaseDate || null
                };
              }
              process.stdout.write('.');
            }

            // Sort by release date descending (most recent = recently added to GP)
            const games = ids.map(id => byId[id]).filter(Boolean)
              .sort((a, b) => new Date(b.releaseDate || 0) - new Date(a.releaseDate || 0));

            // Newly added = present now but absent in previous run
            const freshGames = games.filter(g => !existingIds.has(g.id));
            // Keep a rolling window of ~30 recent additions (new ones first, then carry over previous)
            const prevIds = new Set(freshGames.map(g => g.id));
            const carried = existingNewGames.filter(g => !prevIds.has(g.id) && byId[g.id]).slice(0, 30 - freshGames.length);
            const newGames = [...freshGames, ...carried].slice(0, 30);

            console.log(`\nGames: ${games.length}, New this run: ${freshGames.length}, Shown as new: ${newGames.length}`);
            fs.writeFileSync('gamepass.json', JSON.stringify({ games, newGames, updatedAt: new Date().toISOString() }));
          }
          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add gamepass.json
          git diff --cached --quiet || git commit -m 'chore: update Game Pass catalog [skip ci]'
          git push
