name: Update Game Pass catalog
on:
  schedule:
    - cron: '0 6 * * *'
  push:
    paths:
      - '.github/workflows/update-gamepass.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Game Pass catalog
        run: |
          node << 'EOF'
          const https = require('https');
          const fs   = require('fs');

          function get(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'GameShelf-bot/1.0' } }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch(e) { reject(e); } });
              }).on('error', reject);
            });
          }

          async function main() {
            const [s1, s2] = await Promise.all([
              get('https://catalog.gamepass.com/sigls/v2?id=fdd9e2a7-0fee-49f6-ad69-4354098401ff&language=en-US&market=US'),
              get('https://catalog.gamepass.com/sigls/v2?id=b8900d09-a491-44cc-916e-32b5acae621b&language=en-US&market=US'),
            ]);

            const seen = new Set(); const ids = [];
            for (const item of [...s1.slice(1), ...s2.slice(1)])
              if (item.id && !seen.has(item.id)) { seen.add(item.id); ids.push(item.id); }
            console.log('IDs found:', ids.length);

            const byId = {};
            for (let i = 0; i < ids.length; i += 20) {
              const batch = ids.slice(i, i + 20).join(',');
              const data  = await get(
                `https://displaycatalog.mp.microsoft.com/v7.0/products?bigIds=${batch}&market=US&languages=en-US`
              );
              for (const prod of data.Products || []) {
                const loc = prod.LocalizedProperties?.[0];
                if (!loc?.ProductTitle) continue;
                const imgObj = loc.Images?.find(i => ['BoxArt','Poster'].includes(i.ImagePurpose));
                const img = imgObj?.Uri
                  ? (imgObj.Uri.startsWith('//') ? 'https:' + imgObj.Uri : imgObj.Uri)
                  : null;
                byId[prod.ProductId] = { title: loc.ProductTitle, img, id: prod.ProductId };
              }
              process.stdout.write('.');
            }
            // Preserve sigls order (newest first = Microsoft's "recently added" order)
            const games = ids.map(id => byId[id]).filter(Boolean);
            console.log('\nGames saved:', games.length);
            fs.writeFileSync('gamepass.json', JSON.stringify({ games, updatedAt: new Date().toISOString() }));
          }
          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add gamepass.json
          git diff --cached --quiet || git commit -m 'chore: update Game Pass catalog [skip ci]'
          git push
